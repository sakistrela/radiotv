<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Η Σελίδα Μου</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Το iframe φορτώνει την πραγματική σελίδα. Ο κώδικας της real-page.html δεν φαίνεται στο view-source -->
    <iframe src="kentri.html"></iframe>

    <script>
        // Εγγραφή του Service Worker για να σαμποτάρει τις λήψεις/αποθηκεύσεις
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Protection Active'))
            .catch(err => console.error('Error:', err));
        }
    </script>
</body>
</html>
