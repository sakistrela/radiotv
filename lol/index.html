<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Radio Player</title>
</head>
<body>

    <audio id="audio" controls autoplay style="width: 100%;">
        <source src="https://giss.tv:667/radiotrela.mp3" type="audio/mpeg">
    </audio>

    <div style="margin-top: 10px; font-family: sans-serif; font-size: 20px;">
        Τίτλος: <span id="title">Αναμονή για δεδομένα...</span>
    </div>

    <script>
        const titleSpan = document.getElementById('title');
        
        async function fetchTitle() {
            try {
                // Χρήση του τοπικού proxy.php για λήψη των δεδομένων
                const response = await fetch('proxy.php');
                const data = await response.json();
                
                // Εντοπισμός του συγκεκριμένου stream
                const source = data.icestats.source.find(s => s.listenurl && s.listenurl.includes('radiotrela.mp3'));
                
                if (source && source.title) {
                    titleSpan.innerText = source.title;
                } else {
                    titleSpan.innerText = "Δεν βρέθηκε τίτλος";
                }
            } catch (e) {
                titleSpan.innerText = "Σφάλμα φόρτωσης τίτλου (ελέγξτε το proxy.php)";
            }
        }

        setInterval(fetchTitle, 5000);
        fetchTitle();
    </script>
</body>
</html>
